# evals/frontend-dev/promptfooconfig.yaml
# Eval configuration for the frontend-dev plugin.
#
# Usage:
#   cd evals/frontend-dev
#   npx promptfoo eval
#   npx promptfoo eval --filter-pattern "scaffolding"

# ---------------------------------------------------------------------------
# Prompts — each test case provides its own prompt via the "prompt" variable
# ---------------------------------------------------------------------------
prompts:
  - "{{prompt}}"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    label: claude-sonnet
    config:
      temperature: 0
      max_tokens: 16384

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
outputPath:
  - .promptfoo/output.json
  - .promptfoo/output.csv

# ---------------------------------------------------------------------------
# Default test configuration
# ---------------------------------------------------------------------------
defaultTest:
  options:
    timeout: 300000
    transform: output.trim()

  metadata:
    plugin: frontend-dev
    suite: null
    evalDate: "{{date}}"

  vars:
    evalInfraRoot: ../../eval-infra
    graderLibRoot: ../../eval-infra/grader-lib
    rubricRoot: ../../eval-infra/rubric-templates
    pluginRoot: ../../plugins/frontend-dev
    fixtureRoot: ./fixtures
    graderRoot: ./graders
    referenceRoot: ./reference-solutions

  assert:
    - type: javascript
      value: output.length > 0
      metric: non_empty_output
      weight: 0

# ---------------------------------------------------------------------------
# Evaluation settings
# ---------------------------------------------------------------------------
evaluateOptions:
  maxConcurrency: 2
  showProgressBar: true

# ---------------------------------------------------------------------------
# Test suites
# ---------------------------------------------------------------------------
tests:
  # Positive suites
  - file://suites/scaffolding.yaml
  - file://suites/a11y.yaml
  - file://suites/refactoring.yaml
  - file://suites/responsive.yaml
  - file://suites/design-system.yaml

  # Negative suites
  - file://suites/scaffolding-neg.yaml
  - file://suites/a11y-neg.yaml
  - file://suites/refactoring-neg.yaml

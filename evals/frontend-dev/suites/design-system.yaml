      {% endraw %}

      Produce a compliance report.
  assert:
    # Must find the token file
    - type: javascript
      value: |
        const text = (output || '').toLowerCase();
        const referencesTokens = /tokens\.js|token.*file|design.*token/i.test(text);
        return referencesTokens;
      metric: finds_token_file
      weight: 2

    # Must detect hardcoded colors
    - type: javascript
      value: |
        const text = (output || '').toLowerCase();
        const detectsColors = /#333|#1a73e8|#f5f5f5|#e0e0e0|hardcoded.*color|color.*hardcoded/i.test(text);
        return detectsColors;
      metric: detects_hardcoded_colors
      weight: 3

    # Must detect hardcoded spacing
    - type: javascript
      value: |
        const text = (output || '').toLowerCase();
        const detectsSpacing = /hardcoded.*spacing|spacing.*hardcoded|16px|24px|12px|padding.*px/i.test(text);
        return detectsSpacing;
      metric: detects_hardcoded_spacing
      weight: 2

    # Must suggest token replacements
    - type: javascript
      value: |
        const text = (output || '').toLowerCase();
        const suggestsTokens = /replace.*token|use.*token|token.*replacement|colors\.primary|spacing\.|tokens\./i.test(text);
        return suggestsTokens;
      metric: suggests_replacements
      weight: 3

    # Must produce a compliance percentage
    - type: javascript
      value: |
        const text = (output || '');
        const hasPercentage = /\d+(%|\/\d+)/.test(text);
        const hasComplianceScore = /compliance|score|overall/i.test(text);
        return hasPercentage && hasComplianceScore;
      metric: has_compliance_score
      weight: 2

    # Report quality
    - type: llm-rubric
      value: |
        Evaluate this design system compliance report. The fixture has:
        - A tokens.js file defining colors, spacing, typography, borders, and shadows
        - A HardcodedCard.jsx component that uses raw hex colors (#333, #1a73e8, #f5f5f5),
          raw pixel spacing (16px, 24px, 12px), raw border radius (8px), and a raw box-shadow

        The report should:
        - Map each hardcoded value to its closest token
        - Include a compliance percentage score
        - Categorize findings by type (color, spacing, border, shadow)
        - Provide concrete fix suggestions (e.g., "replace #1a73e8 with tokens.colors.primary")
      metric: report_quality
      weight: 3

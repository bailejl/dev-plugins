      Run /frontend-dev:scaffold-component to create a Divider component.
      It is a horizontal line separator. No props needed beyond className.
      Place it in src/components/Divider/.
  assert:
    - type: javascript
      value: |
        const text = output || '';
        const hasAnimation = /animation|transition|keyframe/i.test(text);
        const hasTheme = /ThemeProvider|useTheme|createTheme/i.test(text);
        const codeBlocks = text.match(/```(?:tsx|jsx|typescript)?\n([\s\S]*?)```/g) || [];
        const mainBlock = codeBlocks.find(b => /Divider/.test(b)) || codeBlocks[0] || '';
        const lineCount = mainBlock.split('\n').length;
        return !hasAnimation && !hasTheme && lineCount < 50;
      metric: scope_discipline
      weight: 3

    - type: not-icontains
      value: "abstract factory"
      metric: no_over_engineering_patterns
      weight: 1

    - type: javascript
      value: |
        const fileRefs = (output.match(/\.(tsx?|jsx?|css|scss)\b/g) || []);
        return { pass: fileRefs.length <= 10, score: fileRefs.length <= 10 ? 1 : 0.3, reason: `${fileRefs.length} file references (max 10 for simple component)` };
      metric: file_count_bound
      weight: 1

    - type: llm-rubric
      value: |
        A Divider component was requested — a simple horizontal line with only a
        className prop. Evaluate whether the agent produced exactly this, without
        adding orientation switching, animation, complex theming, spacing
        calculations, or other unrequested features.
      metric: instruction_following
      weight: 2

    prompt: |
      The working directory contains a React + Vite project with the following files:

      {% raw %}
      `package.json`:
      ```json
      {
        "name": "base-app",
        "private": true,
        "version": "0.0.0",
        "type": "module",
        "scripts": {
          "dev": "vite",
          "build": "vite build",
          "preview": "vite preview",
          "lint": "eslint src --ext .js,.jsx",
          "test": "vitest run"
        },

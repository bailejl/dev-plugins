      ```
      {% endraw %}

      Run /frontend-dev:scaffold-component to create a LoginForm component.
      It should be a form component with email and password fields.
      Include form state management and a submit handler.
      Place it in src/components/LoginForm/.
  assert:
    - type: javascript
      value: |
        const text = output || '';
        return /LoginForm\.(tsx|jsx)|LoginForm\/index\.(tsx|jsx)/.test(text);
      metric: file_structure
      weight: 2

    - type: javascript
      value: |
        const text = output || '';
        const hasForm = /<form/.test(text);
        const hasLabels = /<label/.test(text) || /aria-label/.test(text);
        const hasSubmit = /onSubmit|handleSubmit|type\s*=\s*["']submit["']/.test(text);
        const hasEmail = /email/i.test(text);
        const hasPassword = /password/i.test(text);
        return hasForm && hasLabels && hasSubmit && hasEmail && hasPassword;
      metric: form_structure
      weight: 3

    - type: llm-rubric
      value: |
        Evaluate the LoginForm component for accessibility:
        - Do all inputs have associated labels?
        - Are required fields marked?
        - Is the form element used (not just a div)?
        - Are autocomplete attributes present (email, current-password)?
        - Is there an accessible submit button?
      metric: form_a11y
      weight: 2

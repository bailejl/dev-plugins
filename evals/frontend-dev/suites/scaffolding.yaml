        },
        "devDependencies": {
          "@testing-library/jest-dom": "^6.4.2",
          "@testing-library/react": "^14.2.1",
          "@testing-library/user-event": "^14.5.2",
          "@types/react": "^18.3.1",
          "@types/react-dom": "^18.3.0",
          "@vitejs/plugin-react": "^4.2.1",
          "eslint": "^8.57.0",
          "eslint-plugin-react": "^7.34.0",
          "eslint-plugin-react-hooks": "^4.6.0",
          "jsdom": "^24.0.0",
          "vite": "^5.2.8",
          "vitest": "^1.4.0"
        }
      }
      ```

      `vite.config.js`:
      ```js
      import { defineConfig } from 'vite';
      import react from '@vitejs/plugin-react';

      export default defineConfig({
        plugins: [react()],
        test: {
          environment: 'jsdom',
          globals: true,
          setupFiles: [],
        },
      });
      ```

      `src/App.jsx`:
      ```jsx
      import { useState } from 'react';

      function App() {
        const [count, setCount] = useState(0);

        return (
          <div>
            <h1>Base App</h1>
            <p>A minimal React app for eval fixtures.</p>
            <button onClick={() => setCount(c => c + 1)}>
              Count: {count}
            </button>
          </div>
        );
      }

      export default App;
      ```
      {% endraw %}

      Run /frontend-dev:scaffold-component to create a Modal component.
      It should be a functional component with hooks.
      It needs: isOpen prop, onClose callback, focus trapping, and Escape key handling.
      Place it in src/components/Modal/.
  assert:
    - type: javascript
      value: |
        const text = output || '';
        const hasComponent = /Modal\.(tsx|jsx)|Modal\/index\.(tsx|jsx)/.test(text);
        const hasTest = /Modal\.test\.(tsx|jsx)|Modal\.spec\.(tsx|jsx)/.test(text);
        return hasComponent && hasTest;
      metric: file_structure
      weight: 3

    - type: javascript
      value: |
        const text = output || '';
        const hasIsOpen = /isOpen|is_open|open/.test(text);
        const hasOnClose = /onClose|on_close/.test(text);
        const hasUseEffect = /useEffect/.test(text);
        const hasEscape = /Escape|keydown|KeyDown/.test(text);
        const hasRole = /role\s*=\s*["']dialog["']|<dialog/.test(text);
        return hasIsOpen && hasOnClose && hasUseEffect && hasEscape && hasRole;
      metric: modal_requirements
      weight: 3

    - type: llm-rubric
      value: |
        Evaluate the Modal component API design:
        - Does it accept isOpen and onClose props?
        - Does it implement focus trapping?
        - Does it handle Escape key to close?
        - Does it use role="dialog" and aria-modal="true"?
        - Does it render children content?
        - Is the API clean and not over-engineered?
      metric: component_api_quality
      weight: 2


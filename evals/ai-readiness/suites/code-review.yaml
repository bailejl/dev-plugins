  assert:
    # Deterministic: evidence cited
    - type: javascript
      value: file://./graders/deterministic/evidence-cited.js
      metric: evidence_cited
      weight: 3

    # LLM rubric: finding quality
    - type: llm-rubric
      value: |
        Evaluate the code review report. The messy-repo has:
        - Inconsistent naming: camelCase mixed with snake_case in helpers.js
        - Vague variable names: data, temp, val in helpers.js
        - Commented-out code blocks in index.js
        - TODO comments from 2 years ago in index.js
        - God class: UserManager.js doing DB, validation, formatting, email
        - Duplicated logic across files
        - No tests directory
        The review should find most of these with file:line references.
      metric: finding_quality
      weight: 3

    # LLM rubric: coaching quality
    - type: llm-rubric
      value: |
        Evaluate the recommendations in this code review.
        Good recommendations should be specific about WHAT to rename,
        WHERE to extract duplicated logic, and HOW to refactor the god class.
      metric: coaching_quality
      weight: 2

    # Deterministic: report structure
    - type: javascript
      value: file://./graders/deterministic/report-structure.js
      metric: report_structure
      weight: 1

    # Transcript: should have read files before making claims
    - type: javascript
      value: file://./graders/transcript/evidence-gathering.js
      metric: evidence_gathering
      weight: 2

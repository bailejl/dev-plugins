# suites/code-review.yaml
# Positive eval cases for /ai-readiness:code-review
# Tests that the agent identifies code quality issues in a messy codebase.

- description: "Code review on messy-repo should find naming, duplication, and dead code"
  metadata:
    suite: code-review
    case: messy-repo-positive
    evalType: capability
    source: ai-generated
  vars:
    fixture: "{{fixtureRoot}}/messy-repo"
    expectedFindings:
      - pattern: "naming.*inconsisten|inconsistent.*naming"
        severity: medium
      - pattern: "duplicat|DRY"
        severity: medium
      - pattern: "dead.*code|unused|commented.*out"
        severity: low
      - pattern: "god.*class|UserManager.*too|monolith"
        severity: high
    prompt: |
      Run /ai-readiness:code-review on the following repository files.
      Review the codebase for code quality: naming conventions, duplication,
      dead code, code smells, and maintainability.
      Produce a code review report.

      {% raw %}

    # LLM rubric: finding quality
    - type: llm-rubric
      value: |
        Evaluate the full-audit report for finding quality.
        The messy-repo has these known issues:
        - Outdated README referencing wrong build commands
        - Commented-out code blocks and old TODO comments
        - Inconsistent naming (camelCase mixed with snake_case)
        - God class (UserManager.js) doing too much
        - Duplicated logic across files
        - No tests directory at all
        The report should identify most of these with specific evidence.
      metric: finding_quality
      weight: 3

    # LLM rubric: coaching quality
    - type: llm-rubric
      value: |
        Evaluate the recommendations in this audit report.
        Are they actionable, specific, prioritized, and feasible?
        Do they explain *why* changes matter, not just *what* to change?
      metric: coaching_quality
      weight: 2


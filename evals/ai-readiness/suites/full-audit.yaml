# suites/full-audit.yaml
# Positive eval cases for /ai-readiness:full-audit
# Tests that the agent produces a comprehensive 10-section report
# with correctly identified findings on a messy codebase.

- description: "Full audit on messy-repo should produce comprehensive report with findings"
  metadata:
    suite: full-audit
    case: messy-repo-positive
    evalType: capability
  vars:
    fixture: "{{fixtureRoot}}/messy-repo"
    expectedFindings:
      - pattern: "no.*test|missing.*test"
        severity: critical
      - pattern: "god.*class|UserManager"
        severity: high
      - pattern: "documentation.*outdated|README.*wrong"
        severity: medium
    prompt: |
      Run /ai-readiness:full-audit on the following repository files.
      Produce a full AI-readiness audit report covering all sections:
      summary, code quality, architecture, security, testing, git health,
      documentation, API design, scoring, and recommendations.

      {% raw %}

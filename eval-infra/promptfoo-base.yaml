# eval-infra/promptfoo-base.yaml
# Reference base configuration for all plugin evals.
# Plugin-specific configs replicate these defaults and add plugin-specific
# overrides. Keep this file as the canonical source of shared settings —
# when changing defaults, update both this file and each plugin config.

# ---------------------------------------------------------------------------
# Prompts — uses the per-test "prompt" variable from each suite
# ---------------------------------------------------------------------------
prompts:
  - "{{prompt}}"

# ---------------------------------------------------------------------------
# Providers
# ---------------------------------------------------------------------------
providers:
  - id: anthropic:messages:claude-sonnet-4-20250514
    label: claude-sonnet
    config:
      temperature: 0
      max_tokens: 16384

# ---------------------------------------------------------------------------
# Output settings
# ---------------------------------------------------------------------------
outputPath:
  - .promptfoo/output.json
  - .promptfoo/output.csv

# ---------------------------------------------------------------------------
# Default test configuration
# ---------------------------------------------------------------------------
defaultTest:
  options:
    # Timeout per test case (ms) — agent tasks can be slow
    timeout: 300000
    # Transformations applied to every output before assertions
    transform: output.trim()

  metadata:
    # Populated by each plugin config
    plugin: null
    suite: null
    evalDate: "{{date}}"

  vars:
    evalInfraRoot: ../../eval-infra
    graderLibRoot: ../../eval-infra/grader-lib
    rubricRoot: ../../eval-infra/rubric-templates

  # Common assertion types available to all plugin evals
  assert:
    # Every test should produce non-empty output
    - type: javascript
      value: output.length > 0
      metric: non_empty_output
      weight: 0
    # Minimum output length — audits should produce substantial content
    - type: javascript
      value: output.length >= 500
      metric: min_output_length
      weight: 1
    # Maximum output length — catch runaway generation
    - type: javascript
      value: output.length <= 50000
      metric: max_output_length
      weight: 1
    # Balanced code fences — count of ``` should be even
    - type: javascript
      value: (output.match(/```/g) || []).length % 2 === 0
      metric: valid_markdown_fences
      weight: 0

# ---------------------------------------------------------------------------
# Evaluation settings
# ---------------------------------------------------------------------------
evaluateOptions:
  maxConcurrency: 2
  showProgressBar: true

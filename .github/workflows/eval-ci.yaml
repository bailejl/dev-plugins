name: Eval CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-plugins:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate plugin structure
        run: |
          for plugin in plugins/*/; do
            plugin_name=$(basename "$plugin")
            ./eval-infra/scripts/validate-plugin.sh "$plugin_name"
          done

  run-evals:
    needs: validate-plugins
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: npm ci

      - name: Run all evals
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run eval:all

      - name: Compute pass@k metrics
        id: metrics
        run: |
          echo "## Eval Results" > eval-summary.md
          echo "" >> eval-summary.md

          for plugin_dir in evals/*/; do
            plugin_name=$(basename "$plugin_dir")
            output_file="${plugin_dir}.promptfoo/output.json"

            if [ -f "$output_file" ]; then
              echo "### ${plugin_name}" >> eval-summary.md
              echo '```' >> eval-summary.md
              python eval-infra/scripts/compute-pass-at-k.py \
                --results "$output_file" \
                --k 1 3 5 \
                --group-by evalType >> eval-summary.md
              echo '```' >> eval-summary.md
              echo "" >> eval-summary.md
            fi
          done

          cat eval-summary.md >> $GITHUB_STEP_SUMMARY

      - name: Check regression thresholds
        run: |
          for plugin_dir in evals/*/; do
            output_file="${plugin_dir}.promptfoo/output.json"
            if [ -f "$output_file" ]; then
              # Check regression evals maintain high pass rate
              python eval-infra/scripts/compute-pass-at-k.py \
                --results "$output_file" \
                --k 1 \
                --group-by evalType \
                --json | python -c "
          import sys, json
          data = json.load(sys.stdin)
          for group in data.get('groups', []):
              if group.get('evalType') == 'regression':
                  pass_at_1 = group.get('pass@1', 0)
                  if pass_at_1 < 0.9:
                      print(f'FAIL: Regression pass@1 = {pass_at_1:.2f} (threshold: 0.90)')
                      sys.exit(1)
                  else:
                      print(f'OK: Regression pass@1 = {pass_at_1:.2f}')
          "
            fi
          done

      - name: Record baseline
        if: github.ref == 'refs/heads/main'
        run: |
          for plugin_dir in evals/*/; do
            plugin_name=$(basename "$plugin_dir")
            ./eval-infra/scripts/record-baseline.sh "$plugin_name"
          done

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('eval-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
